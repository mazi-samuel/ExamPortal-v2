<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments - ExamPortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">
    <style>
        .assignment-card { border-left: 4px solid #667eea; }
        .assignment-card.overdue { border-left-color: #f04747; }
        .assignment-card.submitted { border-left-color: #43b581; }
        .due-tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: .75rem; font-weight: 700; }
        .due-upcoming { background: #e3f2fd; color: #1565c0; }
        .due-overdue { background: #fce4ec; color: #c62828; }
        .due-closed { background: #f5f5f5; color: #888; }
        .submission-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .submission-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <nav class="portal-nav" id="portal-nav"></nav>

    <div class="page-wrap">
        <div class="container container-lg" id="mainContent">
            <div class="page-loader" id="loader">
                <div class="loader"></div>
                <p>Loading assignments...</p>
            </div>
        </div>
    </div>

    <!-- Assignment Modal -->
    <div class="modal-overlay" id="assignmentModal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h2 id="assignmentModalTitle">Create Assignment</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form onsubmit="saveAssignment(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="aTitle" class="form-control" required placeholder="Assignment title">
                </div>
                <div class="form-group">
                    <label>Subject *</label>
                    <select id="aSubject" class="form-control" required><option value="">-- Choose --</option></select>
                </div>
                <div class="form-group">
                    <label>Class *</label>
                    <select id="aClass" class="form-control" required><option value="">-- Choose --</option></select>
                </div>
                <div class="form-group">
                    <label>Due Date *</label>
                    <input type="datetime-local" id="aDueDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Max Score</label>
                    <input type="number" id="aMaxScore" class="form-control" value="100" min="1">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="aDescription" class="form-control" rows="3" placeholder="Instructions for students"></textarea>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="aAllowLate"> Allow late submissions</label>
                </div>
                <button type="submit" class="btn btn-success btn-block"><i class="fas fa-save"></i> Save</button>
            </form>
        </div>
    </div>

    <!-- Grade Submission Modal -->
    <div class="modal-overlay" id="gradeModal" style="display:none">
        <div class="modal" style="max-width:600px">
            <div class="modal-header">
                <h2>Grade Submission</h2>
                <button class="modal-close" onclick="closeGradeModal()">&times;</button>
            </div>
            <div id="gradeContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script>
    <script>
        var profile = null;
        var subjects = [];
        var assignmentsList = [];
        var currentView = 'list'; // list | detail
        var currentAssignment = null;
        var submissions = [];

        async function init() {
            profile = await requireAuth(['teacher', 'admin', 'school_admin', 'student']);
            if (!profile) return;
            renderNav(profile);
            await loadSubjects();
            populateSelects();
            await loadAssignments();
            renderPage();
        }

        async function loadSubjects() {
            var q = db.from('subjects').select('*').eq('school_id', profile.school_id);
            if (profile.assigned_class) q = q.eq('class', profile.assigned_class);
            var { data } = await q.order('name');
            subjects = data || [];
        }

        function populateSelects() {
            var subSel = document.getElementById('aSubject');
            subjects.forEach(function(s) {
                var o = document.createElement('option');
                o.value = s.id;
                o.textContent = s.name + ' (' + getClassLabel(s.class) + ')';
                subSel.appendChild(o);
            });
            var clsSel = document.getElementById('aClass');
            CLASS_OPTIONS.forEach(function(c) {
                var o = document.createElement('option');
                o.value = c.value;
                o.textContent = c.label;
                clsSel.appendChild(o);
            });
        }

        async function loadAssignments() {
            try {
                var result = await API.assignments.list({
                    class: profile.role === 'student' ? profile.class : undefined
                });
                assignmentsList = Array.isArray(result) ? result : (result.data || []);
            } catch (e) {
                assignmentsList = [];
            }
        }

        function renderPage() {
            if (currentView === 'detail' && currentAssignment) {
                renderDetail();
                return;
            }
            var el = document.getElementById('mainContent');
            var isTeacher = profile.role !== 'student';
            var html = '';

            html += '<div class="d-flex justify-between align-center flex-wrap gap-2 mb-3">';
            html += '<div><h1><i class="fas fa-tasks"></i> Assignments</h1>';
            html += '<p class="subtitle">' + (isTeacher ? 'Create and manage assignments' : 'View and submit assignments') + '</p></div>';
            if (isTeacher) html += '<button class="btn btn-success" onclick="openModal()"><i class="fas fa-plus-circle"></i> New Assignment</button>';
            html += '</div>';

            if (assignmentsList.length === 0) {
                html += '<div class="empty-state"><i class="fas fa-tasks"></i><h3>No assignments</h3>';
                html += '<p>' + (isTeacher ? 'Create your first assignment.' : 'No assignments posted yet.') + '</p></div>';
            } else {
                html += '<div class="grid grid-2">';
                assignmentsList.forEach(function(a) {
                    var due = a.due_date ? new Date(a.due_date) : null;
                    var now = new Date();
                    var overdue = due && due < now;
                    var cardClass = overdue ? 'overdue' : '';
                    var dueLabel = '';
                    if (due) {
                        if (overdue) dueLabel = '<span class="due-tag due-overdue">Overdue</span>';
                        else dueLabel = '<span class="due-tag due-upcoming">Due ' + due.toLocaleDateString() + '</span>';
                    }

                    html += '<div class="card assignment-card ' + cardClass + '">';
                    html += '<div class="d-flex justify-between align-center mb-2">';
                    html += '<h3 style="margin:0">' + escapeHtml(a.title) + '</h3>';
                    html += dueLabel;
                    html += '</div>';
                    html += '<p class="text-muted" style="font-size:.85rem"><i class="fas fa-book"></i> ' + (a.subject_name || 'N/A') + ' &bull; ' + getClassLabel(a.class || '') + ' &bull; Max: ' + (a.max_score || 100) + '</p>';
                    if (a.description) html += '<p style="font-size:.85rem;color:#555;margin:4px 0">' + escapeHtml(a.description).substring(0, 120) + '</p>';
                    html += '<div class="d-flex gap-2 mt-2">';
                    if (isTeacher) {
                        html += '<button class="btn btn-sm btn-primary" onclick="viewSubmissions(\'' + a.id + '\')"><i class="fas fa-eye"></i> Submissions</button>';
                        html += '<button class="btn btn-sm btn-info" onclick="editAssignment(\'' + a.id + '\')"><i class="fas fa-edit"></i></button>';
                        html += '<button class="btn btn-sm btn-danger" onclick="deleteAssignment(\'' + a.id + '\')"><i class="fas fa-trash"></i></button>';
                    } else {
                        html += '<button class="btn btn-sm btn-success" onclick="submitAssignment(\'' + a.id + '\')"><i class="fas fa-upload"></i> Submit</button>';
                    }
                    html += '</div></div>';
                });
                html += '</div>';
            }
            el.innerHTML = html;
        }

        // --- Modal ---
        function openModal(data) {
            document.getElementById('editId').value = data ? data.id : '';
            document.getElementById('aTitle').value = data ? data.title : '';
            document.getElementById('aSubject').value = data ? data.subject_id : '';
            document.getElementById('aClass').value = data ? data.class : '';
            document.getElementById('aDueDate').value = data && data.due_date ? data.due_date.slice(0, 16) : '';
            document.getElementById('aMaxScore').value = data ? (data.max_score || 100) : 100;
            document.getElementById('aDescription').value = data ? (data.description || '') : '';
            document.getElementById('aAllowLate').checked = data ? data.allow_late : false;
            document.getElementById('assignmentModalTitle').textContent = data ? 'Edit Assignment' : 'Create Assignment';
            document.getElementById('assignmentModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('assignmentModal').style.display = 'none'; }

        async function saveAssignment(e) {
            e.preventDefault();
            var id = document.getElementById('editId').value;
            var payload = {
                title: document.getElementById('aTitle').value.trim(),
                subject_id: document.getElementById('aSubject').value,
                class: document.getElementById('aClass').value,
                due_date: document.getElementById('aDueDate').value,
                max_score: parseInt(document.getElementById('aMaxScore').value) || 100,
                description: document.getElementById('aDescription').value.trim(),
                allow_late: document.getElementById('aAllowLate').checked
            };
            try {
                if (id) { await API.assignments.update(id, payload); showToast('Updated!', 'success'); }
                else { await API.assignments.create(payload); showToast('Created!', 'success'); }
            } catch (err) { showToast(err.message, 'error'); return; }
            closeModal();
            await loadAssignments();
            renderPage();
        }

        function editAssignment(id) {
            var a = assignmentsList.find(function(x) { return x.id === id; });
            if (a) openModal(a);
        }

        async function deleteAssignment(id) {
            if (!confirm('Delete this assignment?')) return;
            try {
                await API.assignments.remove(id);
                showToast('Deleted', 'success');
                await loadAssignments();
                renderPage();
            } catch (err) { showToast(err.message, 'error'); }
        }

        // --- Submissions view ---
        async function viewSubmissions(id) {
            currentAssignment = assignmentsList.find(function(x) { return x.id === id; });
            if (!currentAssignment) return;
            try {
                submissions = await API.assignments.getSubmissions(id);
                if (!Array.isArray(submissions)) submissions = submissions.data || [];
            } catch (e) { submissions = []; }
            currentView = 'detail';
            renderPage();
        }

        function renderDetail() {
            var el = document.getElementById('mainContent');
            var a = currentAssignment;
            var html = '<div class="d-flex align-center gap-2 mb-3">';
            html += '<button class="btn btn-secondary" onclick="backToList()"><i class="fas fa-arrow-left"></i></button>';
            html += '<div><h1>' + escapeHtml(a.title) + '</h1>';
            html += '<p class="subtitle">Submissions (' + submissions.length + ')</p></div>';
            html += '</div>';

            if (submissions.length === 0) {
                html += '<div class="empty-state"><i class="fas fa-inbox"></i><h3>No submissions yet</h3></div>';
            } else {
                html += '<div class="card">';
                submissions.forEach(function(sub) {
                    html += '<div class="submission-row">';
                    html += '<div style="flex:1"><strong>' + escapeHtml(sub.student_name || sub.student_id) + '</strong>';
                    html += '<br><span class="text-muted" style="font-size:.8rem">' + new Date(sub.submitted_at || sub.created_at).toLocaleString() + '</span>';
                    if (sub.is_late) html += ' <span class="due-tag due-overdue">Late</span>';
                    html += '</div>';
                    html += '<div style="font-size:.9rem">';
                    if (sub.score != null) {
                        html += '<span style="font-weight:700;color:#43b581">' + sub.score + '/' + a.max_score + '</span>';
                    } else {
                        html += '<span class="text-muted">Not graded</span>';
                    }
                    html += '</div>';
                    html += '<button class="btn btn-sm btn-primary" onclick="openGrade(\'' + sub.id + '\', ' + (sub.score || 'null') + ', \'' + escapeAttr(sub.feedback || '') + '\')"><i class="fas fa-check-circle"></i> Grade</button>';
                    html += '</div>';
                });
                html += '</div>';
            }
            el.innerHTML = html;
        }

        function backToList() { currentView = 'list'; currentAssignment = null; renderPage(); }

        function openGrade(subId, existingScore, existingFeedback) {
            var html = '<form onsubmit="doGrade(event, \'' + subId + '\')">';
            html += '<div class="form-group"><label>Score</label>';
            html += '<input type="number" id="gradeScore" class="form-control" value="' + (existingScore != null ? existingScore : '') + '" min="0" max="' + (currentAssignment ? currentAssignment.max_score : 100) + '" required></div>';
            html += '<div class="form-group"><label>Feedback</label>';
            html += '<textarea id="gradeFeedback" class="form-control" rows="3">' + escapeHtml(existingFeedback) + '</textarea></div>';
            html += '<button type="submit" class="btn btn-success btn-block"><i class="fas fa-check"></i> Save Grade</button>';
            html += '</form>';
            document.getElementById('gradeContent').innerHTML = html;
            document.getElementById('gradeModal').style.display = 'flex';
        }
        function closeGradeModal() { document.getElementById('gradeModal').style.display = 'none'; }

        async function doGrade(e, subId) {
            e.preventDefault();
            var score = parseFloat(document.getElementById('gradeScore').value);
            var feedback = document.getElementById('gradeFeedback').value.trim();
            try {
                await API.assignments.grade(subId, { score, feedback });
                showToast('Grade saved!', 'success');
                closeGradeModal();
                await viewSubmissions(currentAssignment.id);
            } catch (err) { showToast(err.message, 'error'); }
        }

        // --- Student submission ---
        async function submitAssignment(id) {
            var answer = prompt('Enter your answer or notes for this assignment:');
            if (!answer) return;
            try {
                await API.assignments.submit(id, { content: answer });
                showToast('Submitted!', 'success');
            } catch (err) { showToast(err.message, 'error'); }
        }

        function escapeHtml(str) {
            if (!str) return '';
            var el = document.createElement('span');
            el.textContent = str;
            return el.innerHTML;
        }

        function escapeAttr(str) {
            return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        init();
    </script>
</body>
</html>
