<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - ExamPortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">
    <style>
        .q-card { border-left: 4px solid #667eea; margin-bottom: 12px; }
        .q-card .diff-easy { border-left-color: #43b581; }
        .q-card .diff-medium { border-left-color: #faa61a; }
        .q-card .diff-hard { border-left-color: #f04747; }
        .diff-badge { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: .7rem; font-weight: 700; }
        .diff-easy { background: #d4edda; color: #155724; }
        .diff-medium { background: #fff3cd; color: #856404; }
        .diff-hard { background: #f8d7da; color: #721c24; }
        .tag-chip { display: inline-block; padding: 2px 8px; border-radius: 12px; background: #e8ecff; color: #667eea; font-size: .75rem; margin: 2px; }
        .q-type { display: inline-block; padding: 2px 8px; border-radius: 8px; background: #f0f2ff; color: #667eea; font-size: .7rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav class="portal-nav" id="portal-nav"></nav>

    <div class="page-wrap">
        <div class="container container-lg" id="mainContent">
            <div class="page-loader" id="loader">
                <div class="loader"></div>
                <p>Loading question bank...</p>
            </div>
        </div>
    </div>

    <!-- Question Modal -->
    <div class="modal-overlay" id="questionModal" style="display:none">
        <div class="modal" style="max-width:650px">
            <div class="modal-header">
                <h2 id="qModalTitle">Add Question</h2>
                <button class="modal-close" onclick="closeQModal()">&times;</button>
            </div>
            <form onsubmit="saveQuestion(event)">
                <input type="hidden" id="editQId">
                <div class="form-group">
                    <label>Question *</label>
                    <textarea id="qText" class="form-control" rows="3" required placeholder="Enter the question text"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <div class="form-group" style="flex:1">
                        <label>Type *</label>
                        <select id="qType" class="form-control" required onchange="toggleOptions()">
                            <option value="mcq">Multiple Choice</option>
                            <option value="true_false">True / False</option>
                            <option value="short_answer">Short Answer</option>
                            <option value="fill_blank">Fill in the Blank</option>
                            <option value="essay">Essay</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Difficulty</label>
                        <select id="qDifficulty" class="form-control">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <div class="form-group" style="flex:1">
                        <label>Subject *</label>
                        <select id="qSubject" class="form-control" required><option value="">--</option></select>
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Class *</label>
                        <select id="qClass" class="form-control" required><option value="">--</option></select>
                    </div>
                </div>
                <div id="optionsSection">
                    <div class="form-group">
                        <label>Options (one per line for MCQ)</label>
                        <textarea id="qOptions" class="form-control" rows="4" placeholder="Option A&#10;Option B&#10;Option C&#10;Option D"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label>Correct Answer</label>
                    <input type="text" id="qAnswer" class="form-control" placeholder="Correct answer text">
                </div>
                <div class="form-group">
                    <label>Explanation</label>
                    <textarea id="qExplanation" class="form-control" rows="2" placeholder="Why this is the correct answer (optional)"></textarea>
                </div>
                <div class="form-group">
                    <label>Marks</label>
                    <input type="number" id="qMarks" class="form-control" value="1" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>Tags (comma-separated)</label>
                    <input type="text" id="qTags" class="form-control" placeholder="e.g. algebra, fractions">
                </div>
                <button type="submit" class="btn btn-success btn-block"><i class="fas fa-save"></i> Save Question</button>
            </form>
        </div>
    </div>

    <!-- Generate Paper Modal -->
    <div class="modal-overlay" id="paperModal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h2>Generate Random Paper</h2>
                <button class="modal-close" onclick="closePaperModal()">&times;</button>
            </div>
            <form onsubmit="generatePaper(event)">
                <div class="form-group">
                    <label>Subject *</label>
                    <select id="pSubject" class="form-control" required><option value="">--</option></select>
                </div>
                <div class="form-group">
                    <label>Class *</label>
                    <select id="pClass" class="form-control" required><option value="">--</option></select>
                </div>
                <div class="form-group">
                    <label>Number of Questions</label>
                    <input type="number" id="pCount" class="form-control" value="20" min="5" max="100">
                </div>
                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-random"></i> Generate</button>
            </form>
            <div id="paperResult" class="mt-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script>
    <script>
        var profile = null;
        var subjects = [];
        var questions = [];
        var searchFilters = { q: '', subject_id: '', class: '', difficulty: '', type: '' };
        var page = 1;

        async function init() {
            profile = await requireAuth(['teacher', 'admin', 'school_admin']);
            if (!profile) return;
            renderNav(profile);
            await loadSubjects();
            populateSelects();
            await loadQuestions();
            renderPage();
        }

        async function loadSubjects() {
            var { data } = await db.from('subjects').select('*')
                .eq('school_id', profile.school_id).order('name');
            subjects = data || [];
        }

        function populateSelects() {
            ['qSubject', 'pSubject'].forEach(function(selId) {
                var sel = document.getElementById(selId);
                subjects.forEach(function(s) {
                    var o = document.createElement('option');
                    o.value = s.id;
                    o.textContent = s.name + ' (' + getClassLabel(s.class) + ')';
                    sel.appendChild(o);
                });
            });
            ['qClass', 'pClass'].forEach(function(selId) {
                var sel = document.getElementById(selId);
                CLASS_OPTIONS.forEach(function(c) {
                    var o = document.createElement('option');
                    o.value = c.value;
                    o.textContent = c.label;
                    sel.appendChild(o);
                });
            });
        }

        async function loadQuestions() {
            try {
                var result = await API.questionBank.search({ ...searchFilters, page: page, limit: 20 });
                questions = Array.isArray(result) ? result : (result.data || []);
            } catch (e) { questions = []; }
        }

        function renderPage() {
            var el = document.getElementById('mainContent');
            var html = '';

            // Header
            html += '<div class="d-flex justify-between align-center flex-wrap gap-2 mb-3">';
            html += '<div><h1><i class="fas fa-database"></i> Question Bank</h1>';
            html += '<p class="subtitle">Manage and organize your question library</p></div>';
            html += '<div class="btn-group">';
            html += '<button class="btn btn-success" onclick="openQModal()"><i class="fas fa-plus"></i> Add Question</button>';
            html += '<button class="btn btn-primary" onclick="openPaperModal()"><i class="fas fa-random"></i> Generate Paper</button>';
            html += '</div></div>';

            // Filters
            html += '<div class="card mb-3"><div class="d-flex flex-wrap gap-2 align-center">';
            html += '<input type="text" class="form-control" style="max-width:200px" placeholder="Search..." value="' + escapeAttr(searchFilters.q) + '" oninput="searchFilters.q=this.value" onkeydown="if(event.key===\'Enter\'){page=1;refresh()}">';
            html += '<select class="form-control" style="max-width:160px" onchange="searchFilters.class=this.value;page=1;refresh()">';
            html += '<option value="">All Classes</option>';
            CLASS_OPTIONS.forEach(function(c) { html += '<option value="' + c.value + '"' + (searchFilters.class === c.value ? ' selected' : '') + '>' + c.label + '</option>'; });
            html += '</select>';
            html += '<select class="form-control" style="max-width:140px" onchange="searchFilters.difficulty=this.value;page=1;refresh()">';
            html += '<option value="">All Levels</option>';
            ['easy','medium','hard'].forEach(function(d) { html += '<option value="' + d + '"' + (searchFilters.difficulty === d ? ' selected' : '') + '>' + d.charAt(0).toUpperCase() + d.slice(1) + '</option>'; });
            html += '</select>';
            html += '<select class="form-control" style="max-width:160px" onchange="searchFilters.type=this.value;page=1;refresh()">';
            html += '<option value="">All Types</option>';
            ['mcq','true_false','short_answer','fill_blank','essay'].forEach(function(t) { html += '<option value="' + t + '"' + (searchFilters.type === t ? ' selected' : '') + '>' + t.replace('_',' ') + '</option>'; });
            html += '</select>';
            html += '<button class="btn btn-sm btn-secondary" onclick="page=1;refresh()"><i class="fas fa-search"></i></button>';
            html += '</div></div>';

            // Stats
            html += '<p class="text-muted mb-2" style="font-size:.85rem"><i class="fas fa-list"></i> ' + questions.length + ' questions</p>';

            // Questions
            if (questions.length === 0) {
                html += '<div class="empty-state"><i class="fas fa-database"></i><h3>No questions yet</h3><p>Add your first question to the bank.</p></div>';
            } else {
                questions.forEach(function(q) {
                    var diffClass = 'diff-' + (q.difficulty || 'medium');
                    html += '<div class="card q-card ' + diffClass + '">';
                    html += '<div class="d-flex justify-between align-center mb-2">';
                    html += '<div><span class="q-type">' + (q.question_type || 'mcq').replace('_', ' ') + '</span> ';
                    html += '<span class="diff-badge ' + diffClass + '">' + (q.difficulty || 'medium') + '</span></div>';
                    html += '<span class="text-muted" style="font-size:.8rem">' + (q.marks || 1) + ' mark' + ((q.marks || 1) > 1 ? 's' : '') + '</span>';
                    html += '</div>';
                    html += '<p style="margin:0 0 6px 0;font-weight:600">' + escapeHtml(q.question_text) + '</p>';
                    // Options
                    if (q.options && Array.isArray(q.options) && q.options.length > 0) {
                        html += '<div style="font-size:.85rem;color:#555;margin-bottom:6px">';
                        q.options.forEach(function(opt, i) {
                            var letter = String.fromCharCode(65 + i);
                            var isCorrect = q.correct_answer && q.correct_answer === opt;
                            html += '<div' + (isCorrect ? ' style="color:#43b581;font-weight:700"' : '') + '>' + letter + '. ' + escapeHtml(opt) + (isCorrect ? ' ✓' : '') + '</div>';
                        });
                        html += '</div>';
                    }
                    if (q.correct_answer && (!q.options || q.options.length === 0)) {
                        html += '<p style="font-size:.8rem;color:#43b581;margin:0 0 4px 0"><strong>Answer:</strong> ' + escapeHtml(q.correct_answer) + '</p>';
                    }
                    // Tags
                    if (q.tags && Array.isArray(q.tags) && q.tags.length > 0) {
                        q.tags.forEach(function(t) { html += '<span class="tag-chip">' + escapeHtml(t) + '</span>'; });
                    }
                    html += '<div class="d-flex gap-2 mt-2">';
                    html += '<button class="btn btn-sm btn-info" onclick="editQuestion(\'' + q.id + '\')"><i class="fas fa-edit"></i></button>';
                    html += '<button class="btn btn-sm btn-danger" onclick="deleteQuestion(\'' + q.id + '\')"><i class="fas fa-trash"></i></button>';
                    html += '</div>';
                    html += '</div>';
                });
            }

            el.innerHTML = html;
        }

        async function refresh() { await loadQuestions(); renderPage(); }

        function toggleOptions() {
            var type = document.getElementById('qType').value;
            document.getElementById('optionsSection').style.display = (type === 'mcq') ? '' : 'none';
        }

        // --- CRUD ---
        function openQModal(data) {
            document.getElementById('editQId').value = data ? data.id : '';
            document.getElementById('qText').value = data ? data.question_text : '';
            document.getElementById('qType').value = data ? data.question_type : 'mcq';
            document.getElementById('qDifficulty').value = data ? (data.difficulty || 'medium') : 'medium';
            document.getElementById('qSubject').value = data ? data.subject_id : '';
            document.getElementById('qClass').value = data ? data.class : '';
            document.getElementById('qOptions').value = data && data.options ? data.options.join('\n') : '';
            document.getElementById('qAnswer').value = data ? (data.correct_answer || '') : '';
            document.getElementById('qExplanation').value = data ? (data.explanation || '') : '';
            document.getElementById('qMarks').value = data ? (data.marks || 1) : 1;
            document.getElementById('qTags').value = data && data.tags ? data.tags.join(', ') : '';
            document.getElementById('qModalTitle').textContent = data ? 'Edit Question' : 'Add Question';
            toggleOptions();
            document.getElementById('questionModal').style.display = 'flex';
        }
        function closeQModal() { document.getElementById('questionModal').style.display = 'none'; }

        async function saveQuestion(e) {
            e.preventDefault();
            var id = document.getElementById('editQId').value;
            var optionsRaw = document.getElementById('qOptions').value.trim();
            var options = optionsRaw ? optionsRaw.split('\n').map(function(l) { return l.trim(); }).filter(Boolean) : [];
            var tagsRaw = document.getElementById('qTags').value.trim();
            var tags = tagsRaw ? tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean) : [];

            var payload = {
                question_text: document.getElementById('qText').value.trim(),
                question_type: document.getElementById('qType').value,
                difficulty: document.getElementById('qDifficulty').value,
                subject_id: document.getElementById('qSubject').value,
                class: document.getElementById('qClass').value,
                options: options,
                correct_answer: document.getElementById('qAnswer').value.trim(),
                explanation: document.getElementById('qExplanation').value.trim(),
                marks: parseInt(document.getElementById('qMarks').value) || 1,
                tags: tags
            };
            try {
                if (id) { await API.questionBank.update(id, payload); showToast('Updated!', 'success'); }
                else { await API.questionBank.create(payload); showToast('Question added!', 'success'); }
            } catch (err) { showToast(err.message, 'error'); return; }
            closeQModal();
            await refresh();
        }

        function editQuestion(id) {
            var q = questions.find(function(x) { return x.id === id; });
            if (q) openQModal(q);
        }

        async function deleteQuestion(id) {
            if (!confirm('Delete this question?')) return;
            try { await API.questionBank.remove(id); showToast('Deleted', 'success'); await refresh(); }
            catch (err) { showToast(err.message, 'error'); }
        }

        // --- Generate paper ---
        function openPaperModal() { document.getElementById('paperResult').innerHTML = ''; document.getElementById('paperModal').style.display = 'flex'; }
        function closePaperModal() { document.getElementById('paperModal').style.display = 'none'; }

        async function generatePaper(e) {
            e.preventDefault();
            var resultDiv = document.getElementById('paperResult');
            resultDiv.innerHTML = '<div class="page-loader" style="padding:10px"><div class="loader"></div></div>';
            try {
                var paper = await API.questionBank.generatePaper({
                    subject_id: document.getElementById('pSubject').value,
                    class: document.getElementById('pClass').value,
                    count: parseInt(document.getElementById('pCount').value) || 20
                });
                var qs = Array.isArray(paper) ? paper : (paper.questions || []);
                var html = '<h4>' + qs.length + ' questions generated</h4>';
                qs.forEach(function(q, i) {
                    html += '<p style="font-size:.85rem"><strong>' + (i + 1) + '.</strong> ' + escapeHtml(q.question_text) + ' <span class="diff-badge diff-' + (q.difficulty || 'medium') + '">' + (q.difficulty || 'medium') + '</span></p>';
                });
                resultDiv.innerHTML = html;
            } catch (err) { resultDiv.innerHTML = '<p class="text-muted">' + escapeHtml(err.message) + '</p>'; }
        }

        function escapeHtml(str) {
            if (!str) return '';
            var el = document.createElement('span');
            el.textContent = str;
            return el.innerHTML;
        }
        function escapeAttr(str) { return (str || '').replace(/"/g, '&quot;'); }

        init();
    </script>
</body>
</html>
